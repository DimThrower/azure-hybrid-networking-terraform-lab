#cloud-config
package_update: true
packages:
  - frr
  - frr-pythontools
runcmd:
  - sed -i 's/bgpd=no/bgpd=yes/' /etc/frr/daemons
  - systemctl restart frr
  - sysctl -w net.ipv4.ip_forward=1
  - echo 'net.ipv4.ip_forward=1' >> /etc/sysctl.conf
  - |
    cat >/etc/frr/frr.conf <<'EOF'
    frr version 8.4
    frr defaults traditional
    hostname nva-frr
    service integrated-vtysh-config
    !
    router bgp 65010
      bgp router-id 10.10.20.4
      neighbor 10.10.2.4 remote-as 65515
      neighbor 10.10.2.5 remote-as 65515
      address-family ipv4 unicast
        network 10.50.0.0/16
      exit-address-family
    !
    EOF
  - chown frr:frr /etc/frr/frr.conf
  - systemctl restart frr

# Important: replace Route Server peer IPs and NVA router-id with your actual values.
